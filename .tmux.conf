# Fix esc for Vim
set -sg escape-time 0

# 256 colors
set -g default-terminal "screen-256color-bce"

# start window index of 1
set-option -g base-index 1
setw -g pane-base-index 1

# xterm keys
setw -g xterm-keys on

# aggressive resize
setw -g aggressive-resize off

# renumber windows
set -g renumber-windows on


#--------------
# Mouse
#--------------

set -g mouse on


#--------------
# Key bindings
#--------------

# Use Ctrl+A prefix instead
# unbind C-b
# set -g prefix C-a
# bind C-a last-window

# Navigate windows Vim-style
bind l next-window
bind h previous-window
bind C-l next-window
bind C-h previous-window

# Even up
bind = select-layout even-horizontal

# Clear history
bind k run "tmux send-keys cls Enter && tmux clear-history"

# Vim status keys
set -g status-keys vi

# Smart pane switching with awareness of Vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# Reload Tmux config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."


#--------------
# Copy & paste
#--------------

set -s set-clipboard on      # tmux emits OSC 52 to the outer terminal
set -g allow-passthrough on  # lets apps inside tmux pass escape seqs through

# Use Vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use pbcopy on macOS, xclip on Linux for the system clipboard.
if-shell '[ "$(uname)" = "Darwin" ]' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
if-shell '[ "$(uname)" = "Darwin" ]' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

# When entering copy mode, switch cursor colour to yellow
set-hook -g pane-mode-changed \
  "if -F '#{==:#{pane_mode},copy-mode}' \
      'set -g cursor-colour brightyellow' \
      'set -gu cursor-colour'"


#--------------
# Theme
#--------------

set -g status-bg black
set -g status-fg colour15
set -g status-left '#[fg=colour15]#{b:pane_current_path} #(~/bin/tmux-git-status #{pane_current_path})#[default] '
set -g status-left-length 30
set -g status-right "%l:%M%p"
set -g status-justify centre

set -g window-status-separator " "
set -g window-status-format " #I #W "

set -g window-status-current-style bg=colour15,fg=black
set -g window-status-current-format " #I #W "

set -g message-style bg=black,fg=colour81

set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=colour236
